<div id="mxtts-root">

<h3>猫箱TTS情绪增强</h3>

<hr>

<div>

<label>
<input type="checkbox" id="mxtts-enabled">
启用插件
</label>

</div>

<br>

<div>

<label>TTS Server 地址</label>

<input
id="mxtts-tts-url"
type="text"
placeholder="wss://audio5-normal-hl.myparallelstory.com/internal/api/v1/ws">

</div>

<br>

<div>

<label>AppKey</label>

<input
id="mxtts-appkey"
type="text"
placeholder="WQuVLKMGRo">

</div>

<br>

<div>

<label>默认 voice_id</label>

<input
id="mxtts-default-voice"
type="text"
placeholder="ICL_xxxxxxxxx">

</div>

<br>

<div>

<label>音频格式</label>

<select id="mxtts-format">

<option value="mp3">MP3</option>

<option value="pcm">PCM</option>

</select>

</div>

<br>

<button id="mxtts-save">

保存设置

</button>

<span id="mxtts-msg"></span>

<hr>

<h4>LLM 设置</h4>

<div>

<label>API Base URL</label>

<input
id="mxtts-llm-url"
type="text"
placeholder="https://api.openai.com/v1">

</div>

<br>

<div>

<label>API Key</label>

<input
id="mxtts-llm-key"
type="password">

</div>

<br>

<div>

<label>模型名称</label>

<input
id="mxtts-llm-model"
type="text"
placeholder="gpt-4o-mini">

</div>

<hr>

<h4>角色音色映射</h4>

<div>

每行一个：

<br>

角色名:voice_id

</div>

<br>

<textarea
id="mxtts-voice-map"
rows="10"></textarea>

</div>
