<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫箱TTS情绪增强设置</title>
</head>
<body>
    <div class="plugin-setting" id="mxtts-setting">
        <div class="plugin-header" onclick="toggleMxttsSetting()">
            <span class="plugin-name">猫箱TTS情绪增强</span>
            <span class="plugin-arrow">▼</span>
        </div>
        <div class="plugin-content">
            <!-- TTS设置部分 -->
            <div class="setting-group">
                <h3>TTS设置</h3>
                
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="enabled"> 启用插件
                    </label>
                </div>
                
                <div class="setting-item">
                    <label for="ttsUrl">TTS Server 地址</label>
                    <input type="text" id="ttsUrl" placeholder="wss://audio5-normal-hl.myparallelstory.com/internal/api/v1/ws">
                </div>
                
                <div class="setting-item">
                    <label for="appkey">AppKey</label>
                    <input type="text" id="appkey" placeholder="WQuVLKMGRo">
                </div>
                
                <div class="setting-item">
                    <label for="defaultVoice">默认 voice_id</label>
                    <input type="text" id="defaultVoice" placeholder="ICL_xxxxxxxxx">
                </div>
                
                <div class="setting-item">
                    <label for="format">音频格式</label>
                    <select id="format">
                        <option value="mp3">MP3</option>
                        <option value="pcm">PCM</option>
                    </select>
                </div>
            </div>
            
            <!-- LLM设置部分 -->
            <div class="setting-group">
                <h3>LLM设置</h3>
                
                <div class="setting-item">
                    <label for="apiBaseUrl">API Base URL</label>
                    <input type="text" id="apiBaseUrl" placeholder="https://api.openai.com/v1">
                </div>
                
                <div class="setting-item">
                    <label for="apiKey">API Key</label>
                    <input type="password" id="apiKey" placeholder="您的API密钥">
                </div>
                
                <div class="setting-item">
                    <label for="model">模型名称</label>
                    <input type="text" id="model" placeholder="gpt-4o-mini">
                </div>
            </div>
            
            <!-- 保存按钮 -->
            <button class="btn" onclick="saveSettings()">保存设置</button>
        </div>
    </div>

    <script>
        function toggleMxttsSetting() {
            const setting = document.getElementById('mxtts-setting');
            const content = setting.querySelector('.plugin-content');
            const arrow = setting.querySelector('.plugin-arrow');
            
            if (content.style.display === 'none') {
                content.style.display = 'block';
                arrow.textContent = '▼';
            } else {
                content.style.display = 'none';
                arrow.textContent = '►';
            }
        }
        
        function saveSettings() {
            const settings = {
                enabled: document.getElementById('enabled').checked,
                ttsUrl: document.getElementById('ttsUrl').value,
                appkey: document.getElementById('appkey').value,
                defaultVoice: document.getElementById('defaultVoice').value,
                format: document.getElementById('format').value,
                apiBaseUrl: document.getElementById('apiBaseUrl').value,
                apiKey: document.getElementById('apiKey').value,
                model: document.getElementById('model').value
            };
            
            console.log('保存的设置:', settings);
            alert('设置已保存！');
        }
    </script>
</body>
</html>
