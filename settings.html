<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫箱TTS情绪增强设置</title>
    <style>
        /* 猫箱插件统一的折叠样式 */
        .plugin-setting {
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-bottom: 10px;
            background-color: white;
        }
        
        .plugin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background-color: #f0f0f0;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        
        .plugin-name {
            font-weight: 500;
            color: #333;
        }
        
        .plugin-arrow {
            font-size: 16px;
            transition: transform 0.3s ease;
        }
        
        .plugin-content {
            padding: 15px;
            display: none;
        }
        
        .plugin-setting.expanded .plugin-content {
            display: block;
        }
        
        .plugin-setting.expanded .plugin-arrow {
            transform: rotate(180deg);
        }
        
        /* 设置项样式 */
        .setting-group {
            margin-bottom: 20px;
        }
        
        .setting-item {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
        }
        
        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        input[type="checkbox"] {
            margin-right: 8px;
        }
        
        .btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="plugin-setting" id="mxtts-setting">
        <div class="plugin-header">
            <span class="plugin-name">猫箱TTS情绪增强</span>
            <span class="plugin-arrow">▼</span>
        </div>
        <div class="plugin-content">
            <!-- TTS设置部分 -->
            <div class="setting-group">
                <h3>TTS设置</h3>
                
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="enabled"> 启用插件
                    </label>
                </div>
                
                <div class="setting-item">
                    <label for="ttsUrl">TTS Server 地址</label>
                    <input type="text" id="ttsUrl" placeholder="wss://audio5-normal-hl.myparallelstory.com/internal/api/v1/ws">
                </div>
                
                <div class="setting-item">
                    <label for="appkey">AppKey</label>
                    <input type="text" id="appkey" placeholder="WQuVLKMGRo">
                </div>
                
                <div class="setting-item">
                    <label for="defaultVoice">默认 voice_id</label>
                    <input type="text" id="defaultVoice" placeholder="ICL_xxxxxxxxx">
                </div>
                
                <div class="setting-item">
                    <label for="format">音频格式</label>
                    <select id="format">
                        <option value="mp3">MP3</option>
                        <option value="pcm">PCM</option>
                    </select>
                </div>
            </div>
            
            <!-- LLM设置部分 -->
            <div class="setting-group">
                <h3>LLM设置</h3>
                
                <div class="setting-item">
                    <label for="apiBaseUrl">API Base URL</label>
                    <input type="text" id="apiBaseUrl" placeholder="https://api.openai.com/v1">
                </div>
                
                <div class="setting-item">
                    <label for="apiKey">API Key</label>
                    <input type="password" id="apiKey" placeholder="您的API密钥">
                </div>
                
                <div class="setting-item">
                    <label for="model">模型名称</label>
                    <input type="text" id="model" placeholder="gpt-4o-mini">
                </div>
            </div>
            
            <!-- 保存按钮 -->
            <button class="btn" onclick="saveSettings()">保存设置</button>
        </div>
    </div>

    <script>
        // 猫箱插件统一的折叠功能
        document.addEventListener('DOMContentLoaded', function() {
            const setting = document.getElementById('mxtts-setting');
            const header = setting.querySelector('.plugin-header');
            const arrow = setting.querySelector('.plugin-arrow');
            
            // 初始状态：展开
            setting.classList.add('expanded');
            
            header.addEventListener('click', function() {
                setting.classList.toggle('expanded');
                arrow.textContent = setting.classList.contains('expanded') ? '▼' : '►';
            });
        });
        
        // 保存设置函数
        function saveSettings() {
            // 获取所有设置值
            const settings = {
                enabled: document.getElementById('enabled').checked,
                ttsUrl: document.getElementById('ttsUrl').value,
                appkey: document.getElementById('appkey').value,
                defaultVoice: document.getElementById('defaultVoice').value,
                format: document.getElementById('format').value,
                apiBaseUrl: document.getElementById('apiBaseUrl').value,
                apiKey: document.getElementById('apiKey').value,
                model: document.getElementById('model').value
            };
            
            // 这里可以添加保存到localStorage或发送到服务器的逻辑
            console.log('保存的设置:', settings);
            
            // 显示保存成功提示
            alert('设置已保存！');
        }
    </script>
</body>
</html>
